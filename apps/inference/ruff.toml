# Ruff linter configuration for the inference API
# https://docs.astral.sh/ruff/configuration/

target-version = "py311"
line-length = 120

# Exclude auto-generated and non-source directories
exclude = [
    "notebooks",
    "data",
    "models",
    "__pycache__",
    ".venv",
]

[lint]
# Start with a practical set of rules, expand over time
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
    "UP",   # pyupgrade
]

ignore = [
    "E501",   # line too long — handled by line-length setting
    "S101",   # assert usage — fine in scripts/tests
    "S603",   # subprocess calls — review manually
    "S608",   # SQL injection — raw SQL is intentional in db/
    "B008",   # function call in default arg — Flask patterns
]

[lint.per-file-ignores]
"tests/*" = ["S101", "S106", "E402"]
"scripts/*" = ["S101", "E402", "E701", "S110"]
"agents/*" = ["S106"]
"flask_app.py" = ["E402", "F401"]
"conftest.py" = ["W293"]
"db/__init__.py" = ["F401"]
"agents/__init__.py" = ["F401"]
"core/auth.py" = ["S310", "S110"]
"core/feature_store.py" = ["S110", "S314"]
"agents/live_web_agent.py" = ["S314"]
